apiVersion: v1
kind: Service
metadata:
  name: copy-supervisor-metrics
  namespace: polyhunter-stage1
spec:
  type: ClusterIP
  selector:
    app: copy-supervisor
  ports:
    - name: metrics
      port: 9464
      targetPort: 9464
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: copy-supervisor
  namespace: polyhunter-stage1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: copy-supervisor
  template:
    metadata:
      labels:
        app: copy-supervisor
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: copy-supervisor
          image: ghcr.io/your-org/polyhunter-worker:stage1
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-lc"]
          args:
            - |
              echo "Starting copy supervisor"
              npx tsx scripts/workers/copy-trading-supervisor.ts
          env:
            - name: SUPERVISOR_METRICS_SERVER_ENABLED
              value: "true"
            - name: SUPERVISOR_METRICS_HOST
              value: "0.0.0.0"
            - name: SUPERVISOR_METRICS_PORT
              value: "9464"
          envFrom:
            - configMapRef:
                name: polyhunter-config
            - secretRef:
                name: polyhunter-secrets
          ports:
            - containerPort: 9464
              name: metrics
          readinessProbe:
            httpGet:
              path: /healthz
              port: 9464
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 9464
            initialDelaySeconds: 40
            periodSeconds: 20
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "3Gi"
